<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheep Herder Pro - Web Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        
        /* UI共通 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .pointer-on { pointer-events: auto; }

        /* カウンター & ミッション */
        #hud { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #counter { font-size: 32px; font-weight: bold; }
        #mission-box { 
            margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.4); 
            border-left: 4px solid #ffff00; border-radius: 0 4px 4px 0;
        }
        #mission-title { font-size: 12px; color: #ffff00; font-weight: bold; }

        /* ボタン */
        #view-btn {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; background: rgba(0,0,0,0.6); color: white;
            border: 1px solid white; border-radius: 20px; font-weight: bold; cursor: pointer;
        }

        /* ジョイスティック */
        .joy-container {
            position: absolute; bottom: 40px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
        }
        .joy-stick {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            margin: -20px 0 0 -20px; background: rgba(255,255,255,0.4); border-radius: 50%;
        }
        #left-joy { left: 40px; }
        #right-joy { right: 40px; }

        /* クリア画面 */
        #clear-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 1000;
        }
        #clear-screen h1 { font-size: 48px; color: #ffff00; margin: 0; }
        #restart-btn {
            margin-top: 30px; padding: 15px 40px; font-size: 20px;
            background: transparent; color: white; border: 2px solid white;
            border-radius: 30px; cursor: pointer; transition: 0.3s;
        }
        #restart-btn:hover { background: white; color: black; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="hud">
            <div id="counter">Enclosed: 0 / 20</div>
            <div id="mission-box">
                <div id="mission-title">MISSION</div>
                <div id="mission-text">全ての羊をゴールエリアへ誘導しろ！</div>
            </div>
        </div>
        <div id="view-btn" class="pointer-on">VIEW: TPS</div>
        <div id="left-joy" class="joy-container pointer-on"><div id="left-stick" class="joy-stick"></div></div>
        <div id="right-joy" class="joy-container pointer-on"><div id="right-stick" class="joy-stick"></div></div>
    </div>

    <div id="clear-screen" class="pointer-on">
        <h1>MISSION COMPLETE</h1>
        <p>全ての羊を柵の中に保護しました！</p>
        <button id="restart-btn">PLAY AGAIN</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 定数・フラグ ---
        const NS = 20, WIDTH = 40, DEPTH = 40;
        const GOAL_POS = new THREE.Vector3(14, 0, 14), GOAL_SIZE = new THREE.Vector3(10, 1, 10);
        const LIMIT_X = WIDTH/2 - 0.8, LIMIT_Z = DEPTH/2 - 0.8;
        let isFPS = false, isCleared = false, yaw = 0, pitch = 0;

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 60);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(20, 40, 20);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x666666));

        // 地面 & グリッド
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(WIDTH, DEPTH), new THREE.MeshStandardMaterial({ color: 0x4a7c44 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        const grid = new THREE.GridHelper(WIDTH, 20, 0xffffff, 0xffffff);
        grid.material.opacity = 0.1; grid.material.transparent = true;
        scene.add(grid);

        // ゴール
        const goalArea = new THREE.Mesh(new THREE.BoxGeometry(GOAL_SIZE.x, 0.1, GOAL_SIZE.z), new THREE.MeshStandardMaterial({ color: 0xffff00, transparent: true, opacity: 0.2 }));
        goalArea.position.copy(GOAL_POS);
        scene.add(goalArea);

        // 外壁（柵）
        const fenceMat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
        const createWall = (w, h, d, x, z, ry=0) => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), fenceMat);
            m.position.set(x, h/2, z); m.rotation.y = ry; scene.add(m);
        };
        createWall(WIDTH, 1, 0.2, 0, -DEPTH/2); createWall(WIDTH, 1, 0.2, 0, DEPTH/2);
        createWall(0.2, 1, DEPTH, -WIDTH/2, 0); createWall(0.2, 1, DEPTH, WIDTH/2, 0);

        // 羊の生成
        const sheepList = [];
        const sheepMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        for (let i = 0; i < NS; i++) {
            const group = new THREE.Group();
            group.add(new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 1.0), sheepMat)); // Body
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), sheepMat);
            head.position.set(0, 0.3, 0.5); group.add(head); // Head
            group.position.set(Math.random()*20-10, 0.35, Math.random()*20-10);
            scene.add(group);
            sheepList.push({ mesh: group, velocity: new THREE.Vector3(), isGoal: false, targetPos: new THREE.Vector3() });
        }

        const dog = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 1.2), new THREE.MeshStandardMaterial({ color: 0x212121 }));
        dog.position.set(-15, 0.4, -15);
        scene.add(dog);

        // --- 操作系クラス ---
        class Joystick {
            constructor(id, stickId) {
                this.dom = document.getElementById(id);
                this.stick = document.getElementById(stickId);
                this.vector = new THREE.Vector2();
                this.active = false;
                this.dom.addEventListener('pointerdown', e => { this.active = true; this.update(e); e.stopPropagation(); });
                window.addEventListener('pointermove', e => { if(this.active) this.update(e); });
                window.addEventListener('pointerup', () => { this.active = false; this.vector.set(0,0); this.stick.style.transform = `translate(0,0)`; });
            }
            update(e) {
                const r = this.dom.getBoundingClientRect();
                const center = new THREE.Vector2(r.left + r.width/2, r.top + r.height/2);
                const d = new THREE.Vector2(e.clientX - center.x, e.clientY - center.y);
                const len = Math.min(d.length(), r.width/2);
                d.normalize().multiplyScalar(len);
                this.stick.style.transform = `translate(${d.x}px, ${d.y}px)`;
                this.vector.set(d.x / (r.width/2), d.y / (r.width/2));
            }
        }
        const leftJoy = new Joystick('left-joy', 'left-stick');
        const rightJoy = new Joystick('right-joy', 'right-stick');

        // 視点切り替え
        const vBtn = document.getElementById('view-btn');
        vBtn.addEventListener('click', () => {
            isFPS = !isFPS; vBtn.innerText = isFPS ? "VIEW: FPS" : "VIEW: TPS";
            camera.fov = isFPS ? 80 : 60; camera.updateProjectionMatrix();
        });

        // リスタート機能
        const restartGame = () => {
            isCleared = false; document.getElementById('clear-screen').style.display = 'none';
            sheepList.forEach(s => {
                s.mesh.position.set(Math.random()*20-10, 0.35, Math.random()*20-10);
                s.velocity.set(0,0,0); s.isGoal = false;
            });
            dog.position.set(-15, 0.4, -15);
        };
        document.getElementById('restart-btn').addEventListener('click', restartGame);

        // --- ループ ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);
            if (isCleared) { renderer.render(scene, camera); return; }

            // 犬の移動 & 制限
            if (leftJoy.vector.length() > 0.1) {
                const move = new THREE.Vector3(leftJoy.vector.x, 0, leftJoy.vector.y);
                move.applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw));
                dog.position.add(move.normalize().multiplyScalar(12 * dt));
                dog.lookAt(dog.position.clone().add(move));
            }
            dog.position.x = Math.max(-LIMIT_X, Math.min(LIMIT_X, dog.position.x));
            dog.position.z = Math.max(-LIMIT_Z, Math.min(LIMIT_Z, dog.position.z));

            // 視点回転
            if (rightJoy.active) {
                yaw -= rightJoy.vector.x * 0.06;
                pitch = Math.max(-0.8, Math.min(0.8, pitch - rightJoy.vector.y * 0.04));
            }

            // 羊のロジック
            let goalCount = 0;
            sheepList.forEach(s => {
                const p = s.mesh.position;
                if (!s.isGoal && Math.abs(p.x - GOAL_POS.x) < GOAL_SIZE.x/2 && Math.abs(p.z - GOAL_POS.z) < GOAL_SIZE.z/2) s.isGoal = true;
                if (s.isGoal) {
                    goalCount++;
                    if (p.distanceTo(s.targetPos) < 1) s.targetPos.set(GOAL_POS.x + (Math.random()-0.5)*8, 0.35, GOAL_POS.z + (Math.random()-0.5)*8);
                    s.velocity.lerp(s.targetPos.clone().sub(p).normalize().multiplyScalar(3), 0.05);
                } else {
                    let f = new THREE.Vector3();
                    if (p.distanceTo(dog.position) < 18) f.add(p.clone().sub(dog.position).setY(0).normalize().multiplyScalar(2.5));
                    if (Math.abs(p.x) > 18) f.x += p.x > 0 ? -4 : 4;
                    if (Math.abs(p.z) > 18) f.z += p.z > 0 ? -4 : 4;
                    s.velocity.add(f.multiplyScalar(dt*10)).setLength(Math.min(s.velocity.length(), 8));
                }
                p.add(s.velocity.clone().multiplyScalar(dt));
                if(s.velocity.length() > 0.1) s.mesh.lookAt(p.clone().add(s.velocity));
            });

            document.getElementById('counter').innerText = `Enclosed: ${goalCount} / ${NS}`;
            if (goalCount === NS) { isCleared = true; document.getElementById('clear-screen').style.display = 'flex'; }

            // カメラ
            if (isFPS) {
                camera.position.copy(dog.position).add(new THREE.Vector3(0, 0.7, 0));
                camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            } else {
                const off = new THREE.Vector3(0, 15, 18).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw));
                camera.position.copy(dog.position).add(off); camera.lookAt(dog.position);
            }
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
